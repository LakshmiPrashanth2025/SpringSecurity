spring.application.name=SpringSecurity

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#MYSQL Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/securityDb
#spring.datasource.username=root
#spring.datasource.password=<ToBeCorrectlyEntered>
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

security.jwt.secret-key=testingJwtSecretKeyabcdefIamlearningLakshmiPrashanthTestingNow123456789
security.jwt.expiration-time=360000


# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource Configuration (In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# Hibernate/JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
